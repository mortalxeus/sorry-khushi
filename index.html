<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Khushi 🤍</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #faf5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 {
            font-size: 1.8rem;
            color: #333;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .subtitle {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 30px;
        }

        /* Polaroid Gallery Layout */
        .gallery {
            display: flex;
            gap: 20px;
            max-width: 900px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .polaroid {
            background: white;
            padding: 15px 15px 25px 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.06);
            border-radius: 2px;
            width: 220px;
            transition: transform 0.3s ease;
            cursor: pointer;
            text-align: center;
        }
        .polaroid:hover {
            transform: scale(1.03) rotate(2deg);
        }
        /* Dynamic rotations for a chaotic/natural look */
        .polaroid:nth-child(1) { transform: rotate(-2deg); }
        .polaroid:nth-child(2) { transform: rotate(1deg); }
        .polaroid:nth-child(3) { transform: rotate(-1deg); }

        .polaroid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border: 1px solid #eee;
            margin-bottom: 15px;
        }

        .caption {
            font-size: 0.9rem;
            color: #555;
            font-style: italic;
        }

        /* Minimal Interactive Buttons */
        .decision-box {
            text-align: center;
            height: 80px;
            position: relative;
            width: 300px;
        }
        .ask-text {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #444;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        button {
            padding: 10px 25px;
            font-size: 0.95rem;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        #yesBtn {
            background: #000;
            color: #fff;
        }
        #noBtn {
            background: #f0e6e6;
            color: #888;
            position: absolute;
        }

        /* Success screen overlay */
        .success-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .success-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .success-overlay h2 {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="main-content">
        <h1>Sorry, Khushi.</h1>
        <div class="subtitle">Tap the photos to flip them 🤍</div>

        <div class="gallery">
            <!-- Polaroid 1 -->
            <div class="polaroid" onclick="flipCaption(this, 'Still mad at me? 🥺')">
                <img src="pic1.jpg" onerror="this.src='https://images.unsplash.com/photo-1542382257-80dedb725088?w=400'">
                <div class="caption">Click to reveal...</div>
            </div>

            <!-- Polaroid 2 -->
            <div class="polaroid" onclick="flipCaption(this, 'I promise to buy you food! 🍕')">
                <img src="pic2.jpg" onerror="this.src='https://images.unsplash.com/photo-1516627145497-ae6968895b74?w=400'">
                <div class="caption">Click to reveal...</div>
            </div>

            <!-- Polaroid 3 -->
            <div class="polaroid" onclick="flipCaption(this, 'Best Sister Ever. Hands down. 🏆')">
                <img src="pic3.jpg" onerror="this.src='https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400'">
                <div class="caption">Click to reveal...</div>
            </div>
        </div>

        <div class="decision-box">
            <div class="ask-text">Forgive me?</div>
            <div class="btn-group">
                <button id="yesBtn" onclick="celebrate()">Yes</button>
                <button id="noBtn" onmouseenter="evade()" onclick="evade()">No</button>
            </div>
        </div>
    </div>

    <!-- Minimalistic Success Screen -->
    <div class="success-overlay" id="successScreen">
        <h2>Yay! 🕊️</h2>
        <p style="color: #666;">Ice broken successfully. I'll make it up to you soon!</p>
    </div>

    <script>
        // Simple click-to-reveal mechanic for captions
        function flipCaption(element, message) {
            const caption = element.querySelector('.caption');
            caption.style.opacity = 0;
            setTimeout(() => {
                caption.innerText = message;
                caption.style.opacity = 1;
                caption.style.color = '#000';
                caption.style.fontWeight = '500';
            }, 150);
        }

        // Clean, quick run-away mechanic for the No button
        function evade() {
            const btn = document.getElementById('noBtn');
            const box = document.querySelector('.decision-box').getBoundingClientRect();
            
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function celebrate() {
            document.getElementById('successScreen').classList.add('active');
        }
    </script>
</body>
</html>
